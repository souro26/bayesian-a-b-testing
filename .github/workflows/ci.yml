name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: pip install ruff==0.15.12

      - name: Run Ruff
        run: |
          ruff check .
          ruff format --check .

  fast-tests:
    name: Fast Tests (py${{ matrix.python-version }} • ${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    needs: lint

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    continue-on-error: ${{ matrix.python-version == '3.13' || matrix.python-version == '3.14' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install -e .
          python -m pip install pytest

      - name: Run fast tests only
        run: |
          python -m pytest tests/unit tests/test_math.py
